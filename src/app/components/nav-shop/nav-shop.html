<!-- Brand -->
<div
  class="
    flex
    flex-col

    gap-3
    px-6 py-5
    border-b border-slate-100
    h-full
  "
>
  <div class="flex gap-2 items-center">
    <div
    class="
      flex
      items-center justify-center
      w-8 h-8
      rounded-[5px]
      text-white
      bg-indigo-600
    "
  >
    <svg
      class="
        w-4 h-4
      "
     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <span
    class="
      text-slate-800 text-sm font-bold
    "
  >Admin Shop</span>
  </div>
  <!-- Nav -->
<nav
  class="
    flex flex-1 flex-col
    gap-1
    px-3 py-4
  "
>
  <a routerLink="/dashboard"
    class="
      flex
      items-center
      gap-3
      px-3 py-2.5
      rounded-lg
      text-slate-500 text-sm font-medium
      transition-all
      hover:bg-slate-50 hover:text-slate-700
    "
  >
    <svg
      class="
        w-4 h-4
      "
     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a routerLink="/shop/commande"
    class="
      flex
      items-center
      gap-3
      px-3 py-2.5
      rounded-lg
      text-slate-500 text-sm font-medium
      transition-all
      hover:bg-slate-50 hover:text-slate-700
    "
  >
    <svg
      class="
        w-4 h-4
      "
     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Commandes
  </a>
  <a routerLink="/shop/produit"
    class="
      flex
      items-center
      gap-3
      px-3 py-2.5
      rounded-lg
      text-sm text-slate-500 font-semibold
      hover:bg-slate-50 hover:text-slate-700
    "
  >
    <svg
      class="
        w-4 h-4
      "
     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
    Produits
  </a>
  <a routerLink="/shop/finance"
    class="
      flex
      items-center
      gap-3
      px-3 py-2.5
      rounded-lg
      text-slate-500 text-sm font-medium
      transition-all
      hover:bg-slate-50 hover:text-slate-700
    "
  >
    <svg
      class="
        w-4 h-4
      "
     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Finance
  </a>
  <a routerLink="/shop/vente"
    class="
      flex
      items-center
      gap-3
      px-3 py-2.5
      rounded-lg
      text-slate-500 text-sm font-medium
      transition-all
      hover:bg-slate-50 hover:text-slate-700
    "
  >
    <svg xmlns="http://www.w3.org/2000/svg "
 fill="none"
 viewBox="0 0 24 24"
 stroke-width="1.5"
 stroke="currentColor"
   class="
     w-4 h-4
     text-gray-500
   "
 >
  <rect x="2.25" y="6.75" width="19.5" height="10.5" rx="2.25" ry="2.25"
        stroke-linecap="round"
        stroke-linejoin="round" />
  <circle cx="12" cy="12" r="2.25"
          stroke-linecap="round"
          stroke-linejoin="round" />
  <path d="M18.75 9.75h.008v.008h-.008zM5.25 14.25h.008v.008H5.25z" />
</svg>
    Vente
  </a>
</nav>
</div>



<!-- Déconnexion -->
<div

  class="
    mt-auto
    px-3 py-4
    border-t border-slate-100
    absolute
    bottom-1
  "
>
  <button
    (click)="logout()"
    class="
      flex
      items-center
      gap-3
      w-full
      px-3 py-2.5
      rounded-lg
      text-red-500 text-sm font-medium
      transition-all
      hover:bg-red-50 hover:text-red-600
    "
  >
    <svg
      class="
        w-4 h-4
      "
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Déconnexion
  </button>
</div>
